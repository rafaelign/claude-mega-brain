                - paragraph [ref=e817]:
                  - text: ponytail is the only arm that cuts every metric, and the only one that stays fully safe while doing it. The cut is biggest where there is a real over-build trap (date picker 404 to 23 lines, color picker 287 to 23, because it reaches for a native
                  - code [ref=e818]: <input>
                  - text: "instead of a component) and near zero on code that is already minimal. Full method, per-task tables, and limitations:"
                  - link "benchmarks/results/2026-06-18-agentic.md" [ref=e819] [cursor=pointer]:
                    - /url: /DietrichGebert/ponytail/blob/main/benchmarks/results/2026-06-18-agentic.md
                  - text: .
                - group [ref=e820]:
                  - generic "Older single-shot numbers (isolated generation)" [ref=e821] [cursor=pointer]:
                    - strong [ref=e822]: Older single-shot numbers (isolated generation)
                - paragraph [ref=e823]:
                  - strong [ref=e824]: The rule was never "fewest tokens."
                  - text: "It is: write only what the task needs, and never cut validation, error handling, security, or accessibility. The code ends up small because it is necessary, not golfed. Lower cost and latency are a side effect on the models that follow the ladder; a terse reasoning model that spends thinking tokens deliberating the rungs can go the other way (on GPT-5.5 it does)."
                - generic [ref=e825]:
                  - heading "How it works" [level=2] [ref=e826]
                  - 'link "Permalink: How it works" [ref=e827] [cursor=pointer]':
                    - /url: "#how-it-works"
                    - img [ref=e828]
                - paragraph [ref=e830]: "Before writing code, the agent stops at the first rung that holds:"
                - generic [ref=e831]:
                  - code [ref=e833]: "1. Does this need to exist? → no: skip it (YAGNI) 2. Already in this codebase? → reuse it, don't rewrite 3. Stdlib does it? → use it 4. Native platform feature? → use it 5. Installed dependency? → use it 6. One line? → one line 7. Only then: the minimum that works"
                  - button "Copy code to clipboard" [ref=e835] [cursor=pointer]:
                    - img [ref=e836]
                - paragraph [ref=e839]:
                  - text: The ladder runs
                  - emphasis [ref=e840]: after
                  - text: "it understands the problem, not instead of it: it reads the code the change touches and traces the real flow before picking a rung. Lazy about the solution, never about reading."
                - paragraph [ref=e841]: "Lazy, not negligent: trust-boundary validation, data-loss handling, security, and accessibility are never on the chopping block."
                - generic [ref=e842]:
