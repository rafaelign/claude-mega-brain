                - paragraph [ref=e737]:
                  - strong [ref=e738]: ~54% less code (up to 94%) · ~20% cheaper · ~27% faster · 100% safe
                  - subscript [ref=e739]:
                    - text: Measured on real Claude Code sessions editing a real open-source repo (FastAPI + React), against the same agent with no skill. ~54% is the mean across 12 feature tasks (Haiku 4.5, n=4); it reaches 94% where an agent over-builds (a date picker) and is near zero where the code is already minimal. ponytail keeps every safety guard while a bare "write one-liners" prompt drops one. (The earlier single-shot benchmark reported 80-94% as a flat figure; against a fair agentic baseline that is the per-task ceiling, not the average.)
                    - link "Full writeup" [ref=e740] [cursor=pointer]:
                      - /url: /DietrichGebert/ponytail/blob/main/benchmarks/results/2026-06-18-agentic.md
                    - text: ·
